<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Chapter | Checkout</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #c6934b; --bg: #f9f7f2; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: #333; }
        header { background: var(--primary); color: white; text-align: center; padding: 1.5rem; }
        .container { max-width: 900px; margin: 2rem auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        /* تصميم قسم تفاصيل الشحن والدفع */
        .checkout-form { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .payment-methods { display: flex; gap: 10px; margin: 15px 0; }
        .method { border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; font-size: 0.9rem; }
        .method.active { border-color: var(--accent); background: #fffdf9; color: var(--accent); font-weight: bold; }

        .complete-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .complete-btn:hover { background: #2c3e50; }

        /* قسم ملخص الطلب */
        .order-summary { background: #fff; padding: 25px; border-radius: 12px; height: fit-content; }
        .book-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .book-item img { width: 50px; border-radius: 4px; }
        
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Complete Your Order</h1>
</header>

<div class="container">
    <div class="checkout-form">
        <h3>1. Shipping Details</h3>
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Phone Number (WhatsApp)" required>
        <select>
            <option>Select Area (Kuwait)</option>
            <option>Capital</option>
            <option>Hawally</option>
            <option>Farwaniya</option>
            <option>Mubarak Al-Kabeer</option>
            <option>Ahmadi</option>
            <option>Jahra</option>
        </select>
        <input type="text" placeholder="Block, Street, House No." required>

        <h3>2. Payment Options</h3>
        <p style="font-size: 0.8rem; color: #666;">Choose how you want to pay:</p>
        <div class="payment-methods">
            <div class="method active">K-Net Link</div>
            <div class="method">Cash on Delivery</div>
        </div>

        <button class="complete-btn" onclick="alert('Order Received! We will contact you shortly.')">Place Order</button>
    </div>

    <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="selected-books">
            <p style="color: #888;">Items from your collection will appear here.</p>
        </div>
        <hr>
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
            <span>Total:</span>
            <span>Calculating...</span>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">* Shipping: 2.000 KWD (Flat Rate)</p>
    </div>
</div>

</body>
</html>
