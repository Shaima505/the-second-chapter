<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Chapter | Pre-loved Books</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f9f7f2; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 2rem; text-align: center; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .book-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .book-card h3 { color: #2c3e50; }
        .btn { background-color: #27ae60; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }
        footer { text-align: center; padding: 2rem; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>

<header>
    <h1>The Second Chapter</h1>
    <p>Giving Great Stories a New Life in Kuwait</p>
</header>

<div class="container">
    <h2>Available Collection</h2>
    <div class="book-grid">
        <div class="book-card">
            <h3>Pride & Prejudice</h3>
            <p>Condition: Excellent</p>
            <p>Price: 3.500 KWD</p>
            <a href="https://wa.me/96551234567" class="btn">Order via WhatsApp</a>
        </div>
        <div class="book-card">
            <h3>English Linguistics</h3>
            <p>Condition: Good</p>
            <p>Price: 5.000 KWD</p>
            <a href="https://wa.me/965XXXXXXXX" class="btn">Order via WhatsApp</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 The Second Chapter - MSIT Project</p>
</footer>

</body>
</html>
